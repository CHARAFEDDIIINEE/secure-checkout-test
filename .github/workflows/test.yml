name: CI - Build and Unit Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Job 1: Build WASM ─────────────────────────────────────────────────────
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release --lib

      - name: Copy WASM to project root
        run: cp target/wasm32-unknown-unknown/release/secure_checkout_wasm.wasm .

      - name: Install Node deps
        run: npm ci

      - name: Validate WASM exports
        run: node scripts/validate-wasm.js

      - name: Report WASM size
        run: |
          SIZE=$(wc -c < secure_checkout_wasm.wasm)
          echo "WASM binary: ${SIZE} bytes ($(( SIZE / 1024 )) KiB)"

      - uses: actions/upload-artifact@v4
        with:
          name: secure_checkout_wasm.wasm
          path: secure_checkout_wasm.wasm
          retention-days: 7

  # ── Job 2: Rust unit tests ────────────────────────────────────────────────
  unit-tests:
    name: Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}

      - name: Run unit tests
        run: cargo test --lib -- --test-output immediate

      - name: Clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

  # ── Job 3: Cross-platform WASM validation ─────────────────────────────────
  cross-platform:
    name: WASM on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: secure_checkout_wasm.wasm

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: node scripts/validate-wasm.js

      - name: Test checkout on ${{ matrix.os }}
        uses: ./
        with:
          repository: sigp/lighthouse
          ref:        stable
          token:      ${{ secrets.GITHUB_TOKEN }}
          path:       test-out

      - name: Verify result
        shell: bash
        run: |
          [ -f test-out/README.md ] || { echo "FAIL: README.md missing"; exit 1; }
          ! grep -qF "${{ secrets.GITHUB_TOKEN }}" test-out/.git/config 2>/dev/null \
            && echo "✓ no token in .git/config" \
            || { echo "FAIL: token in .git/config"; exit 1; }
          echo "✓ Cross-platform test passed on $RUNNER_OS"

  # ── Job 4: Security audit ─────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - run: cargo install cargo-audit --locked
      - run: cargo audit
      - run: npm audit --audit-level=high