name: Test secure-checkout-wasm

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this action code
        uses: actions/checkout@v4

      - name: Install Node dependencies
        run: npm install

      - name: Checkout Lighthouse via secure-checkout
        uses: ./
        with:
          repository: sigp/lighthouse
          ref: stable
          token: ${{ secrets.GITHUB_TOKEN }}
          path: lighthouse-out

      - name: Checkout Geth via secure-checkout
        uses: ./
        with:
          repository: ethereum/go-ethereum
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}
          path: geth-out

      - name: Checkout Reth via secure-checkout
        uses: ./
        with:
          repository: paradigmxyz/reth
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          path: reth-out

      - name: Verify security properties
        run: |
          for dir in lighthouse-out geth-out reth-out; do
            # Token must not be in .git/config
            if grep -qF "${{ secrets.GITHUB_TOKEN }}" "$dir/.git/config" 2>/dev/null; then
              echo "::error::SECURITY VIOLATION: token in $dir/.git/config"
              exit 1
            fi
            echo "✓ $dir: no token in .git/config"

            # Token must not be in any source file
            if grep -rqF "${{ secrets.GITHUB_TOKEN }}" "$dir/" \
                --exclude-dir=".git" 2>/dev/null; then
              echo "::error::SECURITY VIOLATION: token in source files of $dir"
              exit 1
            fi
            echo "✓ $dir: token not in source files"
          done

      - name: Verify git history works
        run: |
          echo "--- Lighthouse ---"
          git -C lighthouse-out log --oneline -3

          echo "--- Geth ---"
          git -C geth-out log --oneline -3

          echo "--- Reth ---"
          git -C reth-out log --oneline -3

      - name: Summary
        run: |
          echo "==============================="
          echo "✓ All security checks passed"
          echo "Lighthouse: $(find lighthouse-out -not -path '*/.git/*' -type f | wc -l) files"
          echo "Geth:       $(find geth-out       -not -path '*/.git/*' -type f | wc -l) files"
          echo "Reth:       $(find reth-out       -not -path '*/.git/*' -type f | wc -l) files"
          echo "==============================="